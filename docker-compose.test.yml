services:
  test-db:
    image: postgres:15
    container_name: "test_db"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${TEST_DB_NAME}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d {TEST_DB_NAME}"]
      interval: 1s
      retries: 30
